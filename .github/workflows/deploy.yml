name: Deploy to Cloud Run Jobs

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-east1
  IMAGE: asia-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/etf-sniper/sniper-job

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-east1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:latest

      - name: Update all Cloud Run Jobs
        run: |
          for JOB in etf-sniper-daily etf-sniper-inst etf-sniper-news etf-sniper-ai; do
            echo "=== 更新 $JOB ==="
            gcloud run jobs update $JOB \
              --region ${{ env.REGION }} \
              --image ${{ env.IMAGE }}:latest \
              --set-secrets "/secrets/gcp-sa.json=gcp-sa-json:latest" \
              --update-env-vars "SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }},GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-sa.json,LINE_NOTIFY_TOKEN=${{ secrets.LINE_NOTIFY_TOKEN }},FINMIND_TOKEN=${{ secrets.FINMIND_TOKEN }}" \
            || echo "⚠️ $JOB 更新失敗，請手動檢查（可能該job尚未建立，需先手動 gcloud run jobs create）"
          done

      - name: Verify deployment
        run: |
          echo "✅ 部署完成，各job狀態："
          for JOB in etf-sniper-daily etf-sniper-inst etf-sniper-news etf-sniper-ai; do
            echo "--- $JOB ---"
            gcloud run jobs describe $JOB --region ${{ env.REGION }} --format="value(status.latestCreatedExecution.name,status.conditions[0].status)" || echo "查詢失敗"
          done